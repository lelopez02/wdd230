    <main>
      <h2>Join Us</h2>

      <div class="container-join">
        <form method="get" action="thanks.html">
          <fieldset>
            <legend>Personal Information</legend>
            <label class="top"
              >Name*
              <input type="text" name="fname" pattern="[A-Za-z]{5,}" required
            /></label>
            <label class="top"
              >Usurname*
              <input
                type="text"
                name="fusurname"
                pattern="[A-Za-z]{5,}"
                required
            /></label>
            <label class="top"
              >Phone*
              <input type="tel" name="phone" placeholder="999999999" required
            /></label>
            <label class="top"
              >Email
              <input type="email" name="email" placeholder="someone@gmail.com"
            /></label>
          </fieldset>

          <fieldset>
            <legend>Bussiness Details</legend>

            <label for="bussinessList" class="top"
              >Business Name/Title <input list="bussinessList" name="bussiness"
            /></label>
            <datalist id="Administrator">
              <option value="developer"></option>
              <option value="graphic designer"></option>
              <option value="Accountant"></option>
              <option value="Tourism technician"></option>
              <option value="Architect"></option>
            </datalist>
          </fieldset>

          <fieldset>
            <legend>Membership Level</legend>

            <label class="sbs"
              ><input type="radio" name="audience" value="Non-Profit" />
              Non-Profit Membership: Non profit organizations and there is no
              fee.
            </label>
            <label class="sbs"
              ><input type="radio" name="audience" value="Bronze" /> Bronze
              Membership: $5 per month</label
            >
            <label class="sbs"
              ><input type="radio" name="audience" value="Silver" /> Silver
              Membership: $10 per month</label
            >
            <label class="sbs"
              ><input type="radio" name="audience" value="Gold" /> Gold
              Membership: $15 per month</label
            >

            <label class="top">Submmit</label
            ><textarea id="comments" name="comments"></textarea>
          </fieldset>

          <input type="submit" value="Submmit" class="submitBtn" />
        </form>
      </div>
